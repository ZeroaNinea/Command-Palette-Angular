<div class="input-container">
  <label>{{ label }}</label>
  <div class="text-overlay"></div>

  <div class="input">
    <input
      type="text"
      [value]="value"
      (input)="onInput($any($event.target).value)"
      class="color-text"
    />

    <div class="color-picker-wrapper" (click)="createRipple($event)">
      <input
        type="color"
        [value]="value"
        (input)="onInput($any($event.target).value)"
        class="color-picker"
      />
      <span class="ripple"></span>
      <div class="color-picker-overlay"></div>
    </div>
  </div>
</div>
