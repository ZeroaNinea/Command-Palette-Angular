<div class="input-container">
  <label>{{ label }}</label>
  <div class="text-overlay"></div>

  <div class="input">
    <input
      type="text"
      [value]="value"
      (input)="onInput($any($event.target).value)"
      class="color-text"
    />

    <input
      type="color"
      [value]="value"
      (input)="onInput($any($event.target).value)"
      class="color-picker"
    />
  </div>
</div>
