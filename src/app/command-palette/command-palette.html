@if (isOpen) {
  <div (click)="close()" class="overlay">
    <div (click)="$event.stopPropagation()" class="palette">
      <input placeholder="Type a command..." class="search" />
      <div class="list">
        <!-- <div class="item active">Command</div>
        <div class="item">Command</div> -->
        @for (command of filtered; track $index) {
          <div class="item" (click)="onCommand(command)">{{ command.label }}</div>
        }
      </div>
    </div>
  </div>
}
