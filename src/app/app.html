<main [style.--cp-bg]="neutralPalette().bg">
  <app-command-palette
    [style.--cp-bg]="primaryPalette().bg"
    [style.--cp-text]="primaryPalette().text"
    [style.--cp-accent]="primaryPalette().accent"
    [style.--cp-border]="primaryPalette().border"
    [style.--cp-surface]="primaryPalette().surface"
  ></app-command-palette>

  <section id="color-setup">
    <h1 [style.--cp-section-title]="tertiaryPalette()['900']">Setup the Color Theme</h1>
    <div class="color-inputs">
      <div style="width: 30%">
        <app-color-input
          label="Primary"
          [value]="primary()"
          (valueChange)="primary.set($event)"
          [style.--cp-bg]="neutralPalette().bg"
          [style.--cp-text]="primaryPalette().text"
          [style.--cp-accent]="primaryPalette().accent"
          [style.--cp-border]="primaryPalette().border"
          [style.--cp-surface]="primaryPalette().surface"
          [style.--cp-input-border]="primaryPalette()['300']"
          [style.--cp-input-label]="primaryPalette()['900']"
          [style.--cp-label-muted]="neutralPalette()['600']"
          [style.--cp-input-text]="neutralVariantPalette()['900']"
          [style.--cp-input-ripple]="primaryPalette()['100']"
        ></app-color-input>

        <app-color-input
          label="Secondary"
          [value]="secondary()"
          (valueChange)="secondary.set($event)"
          [style.--cp-bg]="neutralPalette().bg"
          [style.--cp-text]="secondaryPalette().text"
          [style.--cp-accent]="secondaryPalette().accent"
          [style.--cp-border]="secondaryPalette().border"
          [style.--cp-surface]="secondaryPalette().surface"
          [style.--cp-input-border]="secondaryPalette()['300']"
          [style.--cp-input-label]="secondaryPalette()['900']"
          [style.--cp-label-muted]="neutralPalette()['600']"
          [style.--cp-input-text]="neutralVariantPalette()['900']"
          [style.--cp-input-bg]="neutralPalette()['50']"
          [style.--cp-input-ripple]="secondaryPalette()['100']"
        ></app-color-input>

        <app-color-input
          label="Tertiary"
          [value]="tertiary()"
          (valueChange)="tertiary.set($event)"
          [style.--cp-bg]="neutralPalette().bg"
          [style.--cp-text]="tertiaryPalette().text"
          [style.--cp-accent]="tertiaryPalette().accent"
          [style.--cp-border]="tertiaryPalette().border"
          [style.--cp-surface]="tertiaryPalette().surface"
          [style.--cp-input-border]="tertiaryPalette()['300']"
          [style.--cp-input-label]="tertiaryPalette()['900']"
          [style.--cp-label-muted]="neutralPalette()['600']"
          [style.--cp-input-text]="neutralVariantPalette()['900']"
          [style.--cp-input-bg]="neutralPalette()['50']"
          [style.--cp-input-ripple]="tertiaryPalette()['100']"
        ></app-color-input>
      </div>
      <div style="width: 30%">
        <app-color-input
          label="Neutral"
          [value]="neutral()"
          (valueChange)="neutral.set($event)"
          [style.--cp-bg]="neutralPalette().bg"
          [style.--cp-text]="neutralPalette().text"
          [style.--cp-accent]="neutralPalette().accent"
          [style.--cp-border]="neutralPalette().border"
          [style.--cp-surface]="neutralPalette().surface"
          [style.--cp-input-border]="neutralPalette()['300']"
          [style.--cp-input-label]="neutralPalette()['900']"
          [style.--cp-label-muted]="neutralPalette()['600']"
          [style.--cp-input-text]="neutralVariantPalette()['900']"
          [style.--cp-input-bg]="neutralPalette()['50']"
          [style.--cp-input-ripple]="neutralPalette()['100']"
        ></app-color-input>

        <app-color-input
          label="Neutral Variant"
          [value]="neutralVariant()"
          (valueChange)="neutralVariant.set($event)"
          [style.--cp-bg]="neutralPalette().bg"
          [style.--cp-text]="neutralVariantPalette().text"
          [style.--cp-accent]="neutralVariantPalette().accent"
          [style.--cp-border]="neutralVariantPalette().border"
          [style.--cp-surface]="neutralVariantPalette().surface"
          [style.--cp-input-border]="neutralVariantPalette()['300']"
          [style.--cp-input-label]="neutralVariantPalette()['900']"
          [style.--cp-label-muted]="neutralPalette()['600']"
          [style.--cp-input-text]="neutralVariantPalette()['900']"
          [style.--cp-input-bg]="neutralPalette()['50']"
          [style.--cp-input-ripple]="neutralVariantPalette()['100']"
        ></app-color-input>

        <app-color-input
          label="Error"
          [value]="error()"
          (valueChange)="error.set($event)"
          [style.--cp-bg]="neutralPalette().bg"
          [style.--cp-text]="errorPalette().text"
          [style.--cp-accent]="errorPalette().accent"
          [style.--cp-border]="errorPalette().border"
          [style.--cp-surface]="errorPalette().surface"
          [style.--cp-input-border]="errorPalette()['300']"
          [style.--cp-input-label]="errorPalette()['900']"
          [style.--cp-label-muted]="neutralPalette()['600']"
          [style.--cp-input-text]="neutralVariantPalette()['900']"
          [style.--cp-input-bg]="neutralPalette()['50']"
          [style.--cp-input-ripple]="errorPalette()['100']"
        ></app-color-input>
      </div>
    </div>

  <router-outlet />
</main>
